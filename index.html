<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>

<link rel="stylesheet" href="style.css">
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family: Arial;
background-color:#7083ff;
}

form{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
}

legend{
font-weight:bold;
}

</style>

<script>

function validateForm(){
    let name = document.forms["jobForm"]["fullname"].value;
    let email = document.forms["jobForm"]["email"].value;
    let telephone = document.forms["jobForm"]["telephone"].value;
    let address = document.forms["jobForm"]["address"].value;
    let jobTitle = document.forms["jobForm"]["jobtitle"].value;
    let employment = document.querySelector('input[name="employment"]:checked');
    let relocate = document.querySelector('input[name="relocate"]:checked');

    if(name == ""){
        alert("Full name must be filled out");
        return false;
    }
    if(email == "" || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        alert("Valid email address is required");
        return false;
    }
    if(telephone == "" || !/^\d{10,}$/.test(telephone.replace(/\D/g, ''))){
        alert("Valid telephone number is required");
        return false;
    }
    if(address == ""){
        alert("Physical address must be filled out");
        return false;
    }
    if(jobTitle == ""){
        alert("Desired job title must be selected");
        return false;
    }
    if(!employment){
        alert("Employment type must be selected");
        return false;
    }
    if(!relocate){
        alert("Relocation preference must be selected");
        return false;
    }

    return true;
}

</script>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Job Application Form</h2>

<form name="jobForm" onsubmit="return validateForm()">

<fieldset class="border p-3 mb-3">
<legend class="w-auto px-2">PERSONAL INFORMATION</legend>

<div class="mb-3">
<label class="form-label"><strong>Full Name</strong></label>
<input type="text" class="form-control" name="fullname" required>
</div>

<div class="mb-3">
<label class="form-label"><strong>Email Address</strong></label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="mb-3">
<label class="form-label"><strong>Telephone</strong></label>
<input type="tel" class="form-control" name="telephone" required>
</div>

<div class="mb-3">
<label class="form-label"><strong>Physical Address</strong></label>
<input type="text" class="form-control" name="address" required>
</div>

</fieldset>


<fieldset class="border p-3 mb-3">
<legend class="w-auto px-2">POSITION INFORMATION</legend>

<div class="mb-3">
<label class="form-label"><strong>Desired Job Title</strong></label>

<select class="form-select" name="jobtitle" required>
<option value="">Select an option</option>
<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>
</select>
</div>

<strong>Employment Type:</strong>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="Part-time contract">
<label class="form-check-label">Part-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="Part-time permanent">
<label class="form-check-label">Part-time permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="Full-time contract">
<label class="form-check-label">Full-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment" value="Full-time permanent">
<label class="form-check-label">Full-time permanent</label>
</div>

</fieldset>


<fieldset class="border p-3 mb-3">
<legend class="w-auto px-2">AREAS OF INTEREST</legend>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Account Executive">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Business Development">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Inside Sales">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Sales Manager">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="VP Sales">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<fieldset class="border p-3 mb-3">
<legend class="w-auto px-2">RELOCATION</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate" value="Yes">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate" value="No">
<label class="form-check-label">No</label>
</div>

</fieldset>


<fieldset class="border p-3 mb-3">
<legend class="w-auto px-2">ADDITIONAL MESSAGE</legend>

<textarea class="form-control" name="message" rows="4"></textarea>

</fieldset>


<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</form>

</div>

</body>
</html>
