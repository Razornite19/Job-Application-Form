<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="glass-form">

<h2 class="text-center mb-4">Job Application Form</h2>

<form name="jobForm" onsubmit="return validateForm()">

<!-- PERSONAL INFO -->

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" name="fullname">
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" name="email">
</div>

<div class="mb-3">
<label class="form-label">Telephone</label>
<input type="tel" class="form-control" name="telephone">
</div>

<div class="mb-3">
<label class="form-label">Physical Address</label>
<input type="text" class="form-control" name="address">
</div>

<div class="mb-3">
<label class="form-label">Desired Job Title</label>

<select class="form-select" name="jobtitle">
<option value="">Select an option</option>
<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>
</select>

</div>

<label class="form-label">Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time contract</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time permanent</label>
</div>

<div class="mb-3">
<label class="form-label">Additional Message</label>
<textarea class="form-control" rows="3"></textarea>
</div>

<div class="text-center">

<button class="btn btn-primary me-2">Submit</button>
<button class="btn btn-secondary" type="reset">Reset</button>

</div>

</form>

</div>

</div>

</body>
</html>
